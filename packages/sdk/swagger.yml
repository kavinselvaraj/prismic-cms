openapi: 3.0.3
info:
  title: JSONPlaceholder API
  version: 1.0.0
  description: Typed OpenAPI contract for the public JSONPlaceholder fake REST API.
servers:
  - url: https://jsonplaceholder.typicode.com
tags:
  - name: Posts
  - name: Comments
  - name: Albums
  - name: Photos
  - name: Todos
  - name: Users
paths:
  /posts:
    get:
      operationId: listPosts
      tags: [Posts]
      parameters:
        - $ref: "#/components/parameters/UserIdQuery"
      responses:
        "200":
          description: A list of posts.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Post"
    post:
      operationId: createPost
      tags: [Posts]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostInput"
      responses:
        "201":
          description: Created post.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"
  /posts/{id}:
    get:
      operationId: getPost
      tags: [Posts]
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: A post.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"
    put:
      operationId: updatePost
      tags: [Posts]
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostInput"
      responses:
        "200":
          description: Updated post.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"
    patch:
      operationId: patchPost
      tags: [Posts]
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostPatch"
      responses:
        "200":
          description: Patched post.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"
    delete:
      operationId: deletePost
      tags: [Posts]
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Deleted post response.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /posts/{id}/comments:
    get:
      operationId: listPostComments
      tags: [Comments]
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Comments for a post.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Comment"
  /comments:
    get:
      operationId: listComments
      tags: [Comments]
      parameters:
        - name: postId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: A list of comments.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Comment"
  /albums:
    get:
      operationId: listAlbums
      tags: [Albums]
      parameters:
        - $ref: "#/components/parameters/UserIdQuery"
      responses:
        "200":
          description: A list of albums.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Album"
  /albums/{id}:
    get:
      operationId: getAlbum
      tags: [Albums]
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: An album.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Album"
  /albums/{id}/photos:
    get:
      operationId: listAlbumPhotos
      tags: [Photos]
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Photos for an album.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Photo"
  /photos:
    get:
      operationId: listPhotos
      tags: [Photos]
      parameters:
        - name: albumId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: A list of photos.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Photo"
  /todos:
    get:
      operationId: listTodos
      tags: [Todos]
      parameters:
        - $ref: "#/components/parameters/UserIdQuery"
        - name: completed
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: A list of todos.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Todo"
  /todos/{id}:
    get:
      operationId: getTodo
      tags: [Todos]
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: A todo.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Todo"
  /users:
    get:
      operationId: listUsers
      tags: [Users]
      responses:
        "200":
          description: A list of users.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
  /users/{id}:
    get:
      operationId: getUser
      tags: [Users]
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: A user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
components:
  parameters:
    IdPath:
      name: id
      in: path
      required: true
      schema:
        type: integer
    UserIdQuery:
      name: userId
      in: query
      schema:
        type: integer
  schemas:
    Post:
      type: object
      required: [userId, id, title, body]
      properties:
        userId:
          type: integer
        id:
          type: integer
        title:
          type: string
        body:
          type: string
    PostInput:
      type: object
      required: [userId, title, body]
      properties:
        userId:
          type: integer
        title:
          type: string
        body:
          type: string
    PostPatch:
      type: object
      properties:
        userId:
          type: integer
        title:
          type: string
        body:
          type: string
    Comment:
      type: object
      required: [postId, id, name, email, body]
      properties:
        postId:
          type: integer
        id:
          type: integer
        name:
          type: string
        email:
          type: string
          format: email
        body:
          type: string
    Album:
      type: object
      required: [userId, id, title]
      properties:
        userId:
          type: integer
        id:
          type: integer
        title:
          type: string
    Photo:
      type: object
      required: [albumId, id, title, url, thumbnailUrl]
      properties:
        albumId:
          type: integer
        id:
          type: integer
        title:
          type: string
        url:
          type: string
          format: uri
        thumbnailUrl:
          type: string
          format: uri
    Todo:
      type: object
      required: [userId, id, title, completed]
      properties:
        userId:
          type: integer
        id:
          type: integer
        title:
          type: string
        completed:
          type: boolean
    User:
      type: object
      required: [id, name, username, email, address, phone, website, company]
      properties:
        id:
          type: integer
        name:
          type: string
        username:
          type: string
        email:
          type: string
          format: email
        address:
          $ref: "#/components/schemas/Address"
        phone:
          type: string
        website:
          type: string
        company:
          $ref: "#/components/schemas/Company"
    Address:
      type: object
      required: [street, suite, city, zipcode, geo]
      properties:
        street:
          type: string
        suite:
          type: string
        city:
          type: string
        zipcode:
          type: string
        geo:
          $ref: "#/components/schemas/Geo"
    Geo:
      type: object
      required: [lat, lng]
      properties:
        lat:
          type: string
        lng:
          type: string
    Company:
      type: object
      required: [name, catchPhrase, bs]
      properties:
        name:
          type: string
        catchPhrase:
          type: string
        bs:
          type: string
